services:
  postgres:
    image: postgres:16-alpine
    container_name: trinity-scheduler-db
    restart: unless-stopped
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: trinity_scheduler
      POSTGRES_USER: trinity
      POSTGRES_PASSWORD: trinity123
    volumes:
      - pgdata:/var/lib/postgresql/data

  mcp-postgres:
    image: mcp/postgres
    container_name: trinity-mcp-postgres
    restart: unless-stopped
    ports:
      - "3001:3001"
    environment:
      DATABASE_URL: postgresql://trinity:trinity123@postgres:5432/trinity_scheduler
      MCP_PORT: 3001
    depends_on:
      - postgres
    command: npx -y @modelcontextprotocol/server-postgres postgresql://trinity:trinity123@postgres:5432/trinity_scheduler

volumes:
  pgdata:
