services:
  postgres:
    image: postgres:16-alpine
    container_name: trinity-scheduler-db
    restart: unless-stopped
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: trinity_scheduler
      POSTGRES_USER: trinity
      POSTGRES_PASSWORD: trinity123
    volumes:
      - pgdata:/var/lib/postgresql/data

volumes:
  pgdata:
